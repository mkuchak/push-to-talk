<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Subtle inner shadow -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Microphone body (capsule) -->
  <rect x="206" y="100" width="100" height="180" rx="50" fill="white"/>

  <!-- Mic grille lines -->
  <line x1="222" y1="148" x2="290" y2="148" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="168" x2="290" y2="168" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="188" x2="290" y2="188" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="208" x2="290" y2="208" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="228" x2="290" y2="228" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>

  <!-- U-shaped holder arc -->
  <path d="M148 220 v40 a108 108 0 0 0 216 0 v-40"
        stroke="white" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Stand -->
  <line x1="256" y1="368" x2="256" y2="400" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="196" y1="400" x2="316" y2="400" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Sound waves (left) -->
  <path d="M110 175 Q85 256 110 337" stroke="white" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M72 145 Q35 256 72 367" stroke="white" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Sound waves (right) -->
  <path d="M402 175 Q427 256 402 337" stroke="white" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M440 145 Q477 256 440 367" stroke="white" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
