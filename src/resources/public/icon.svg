  <!-- Stand -->
  <line x1="256" y1="392" x2="256" y2="424" stroke="white" stroke-width="32" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="192" y1="424" x2="320" y2="424" stroke="white" stroke-width="32" stroke-linecap="round"/>
</svg>
